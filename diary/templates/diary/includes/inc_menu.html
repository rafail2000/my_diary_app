<div class="d-flex flex-column flex-md-row align-items-center p-3 px-md-4 mb-3 bg-white border-bottom">
    <h5 class="me-2 my-0 mr-md-auto fw-bold">MyDiary</h5>

    {% if user.is_authenticated %}
    <nav class="d-flex flex-wrap align-items-center gap-3">
        <!-- Поиск -->
        <form method="get" action="{% url 'diary:diary_list' %}" class="d-flex me-3">
            {% csrf_token %}
            <input type="text"
                   name="search_word"
                   class="form-control form-control-sm me-2"
                   placeholder="Поиск..."
                   style="width: 200px;">
            <button type="submit" class="btn btn-outline-secondary btn-sm">Найти</button>
        </form>

        <!-- Основные кнопки -->
        <div class="d-flex gap-2">
            <a class="btn btn-outline-primary btn-sm" href="{% url 'diary:diary_list' %}">
                Мои записи
            </a>
        </div>

        <!-- Профиль -->
        <div class="d-flex align-items-center gap-2">
            <span class="text-muted small">{{ user.email }}</span>
            <div class="dropdown">
                <button class="btn btn-outline-secondary btn-sm dropdown-toggle" type="button"
                        data-bs-toggle="dropdown">
                    Профиль
                </button>
                <ul class="dropdown-menu dropdown-menu-end">
                    <li>
                        <form method="post" action="{% url 'users:user_edit' user.pk %}">
                            {% csrf_token %}
                            <button type="submit" class="dropdown-item">Редактировать</button>
                        </form>
                    </li>
                    <li><hr class="dropdown-divider"></li>
                    <li>
                        <form method="post" action="{% url 'users:logout' %}">
                            {% csrf_token %}
                            <button type="submit" class="dropdown-item text-danger">Выйти</button>
                        </form>
                    </li>
                </ul>
            </div>
        </div>
    </nav>
    {% endif %}
</div>
